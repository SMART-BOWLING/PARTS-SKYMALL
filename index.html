* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  touch-action: manipulation;

/* ─── NOISE TEXTURE ─── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;

  opacity: 0.4;
}

/* ─── GRID BACKGROUND ─── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: 
    linear-gradient(rgba(220,20,60,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(220,20,60,0.03) 1px, transparent 1px);
  background-size: 40px 40px;

  z-index: 0;
}

/* ─── LOADING SCREEN ─── */
.loading-screen {
  position: fixed;
  inset: 0;
  background: var(--bg-void);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 99999;

}
.loading-screen.fade-out {
  opacity: 0;

  pointer-events: none;
}
.logo-wrapper {
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  width: 300px;
  height: 300px;
}
.glow-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: conic-gradient(var(--crimson), transparent 60%, var(--crimson-dim), transparent 100%);
  animation: spin 3s linear infinite;
  filter: blur(30px);
  opacity: 0.8;
}
.glow-ring-2 {
  position: absolute;
  inset: 20px;
  border-radius: 50%;

  animation: spin 6s linear infinite reverse;
}
.glow-ring-2::before {
  content: '';

  top: -3px;

  width: 6px;

  transform: translateX(-50%);

}

  width: 150px;

  filter: drop-shadow(0 0 20px rgba(220,20,60,0.6));
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (min-width: 1025px) {
  .logo-wrapper { width: 140px; height: 140px; }

}

}

    });
    machineField.appendChild(machineLabel); machineField.appendChild(machineSelect);
    row.appendChild(qtyField); row.appendChild(machineField);
    panel.appendChild(row);
    const panelData = { panel, qtySelect, machineSelect, customQty: null, customMachine: null, partNumber, availableQty };
    qtySelect.addEventListener('change', function() {
      if (this.value === 'other') {
        const s = prompt('Введите количество:', '1');
        if (s !== null && s.trim() !== '') {
          const q = parseInt(s);
          if (!isNaN(q) && q > 0) {
            panelData.customQty = q;
            const ex = Array.from(qtySelect.options).find(o => o.value === 'custom');
            if (ex) qtySelect.remove(ex.index);
            const co = document.createElement('option');
            co.value = 'custom'; co.textContent = `Другое (${q})`;
            qtySelect.add(co, qtySelect.options.length - 1);
            qtySelect.value = 'custom';
          } else { alert('Пожалуйста, введите положительное число'); this.value = '1'; }
        } else { this.value = '1'; }
      }
    });
    machineSelect.addEventListener('change', function() {
      if (this.value === 'Другое') {
        const m = prompt('Введите номер машины:', '');
        if (m !== null && m.trim() !== '') {
          panelData.customMachine = m.trim();
          const ex = Array.from(machineSelect.options).find(o => o.value === 'custom');
          if (ex) machineSelect.remove(ex.index);
          const co = document.createElement('option');
          co.value = 'custom'; co.textContent = `Другое (${m})`;
          machineSelect.add(co, machineSelect.options.length - 1);
          machineSelect.value = 'custom';
        } else { alert('Номер машины не может быть пустым'); this.value = machines[0]; }
      }
    });
    takeButton.panelData = panelData;
    return panel;
  }

  function createCard(entry) {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.row = entry.rowIndex;
    div.dataset.partNumber = entry.partNumber.toLowerCase();

    const media = document.createElement('div');
    media.className = 'media-block';

    if (entry.fileUrl) {
      if (entry.fileUrl.includes('/preview')) {
        const iframe = document.createElement('iframe');
        iframe.src = entry.fileUrl;
        media.appendChild(iframe);
      } else {
        const img = document.createElement('img');
        img.src = entry.fileUrl;
        img.loading = 'lazy';
        img.decoding = 'async';
        media.appendChild(img);
      }
    } else {
      const ph = document.createElement('div');
      ph.className = 'media-block-placeholder';
      ph.innerHTML = '<i class="fas fa-image"></i>';
      media.appendChild(ph);
    }

    const overlay = document.createElement('div');
    overlay.className = 'img-overlay';
    media.appendChild(overlay);
    div.append(media);

    const partNameContainer = document.createElement('div');
    partNameContainer.className = 'part-name-container';
    partNameContainer.dataset.partNumber = entry.partNumber;
    const partNameText = document.createElement('div');
    partNameText.className = 'part-name-text';
    partNameText.textContent = entry.partName || 'Нет названия';
    const editButton = document.createElement('button');
    editButton.className = 'part-name-edit-btn';
    editButton.innerHTML = '<i class="fas fa-pen"></i>';
    partNameContainer.appendChild(partNameText);
    partNameContainer.appendChild(editButton);
    div.append(partNameContainer);

    const controls = document.createElement('div');
    controls.className = 'controls';

    const pill = document.createElement('div');
    pill.className = 'pill';
    pill.textContent = entry.partNumber;
    pill.addEventListener('click', function() { copyToClipboard(entry.partNumber, this); });

    const qtyInput = document.createElement('input');
    qtyInput.type = 'text';
    qtyInput.className = 'qty-display';
    qtyInput.value = entry.quantity;
    qtyInput.readOnly = true;
    // Color quantity based on value
    if (entry.quantity === 0) qtyInput.style.color = '#ef4444';
    else if (entry.quantity <= (entry.minStock || 3)) qtyInput.style.color = '#f59e0b';
    else qtyInput.style.color = '#10b981';

    const btnAdd = document.createElement('button');
    btnAdd.className = 'btn btn-add';
    btnAdd.innerHTML = '<i class="fas fa-plus"></i> <span>ДОБАВИТЬ</span>';

    const btnInfo = document.createElement('button');
    btnInfo.className = 'btn btn-info';
    btnInfo.innerHTML = '<i class="fas fa-history"></i>';

    const btnTake = document.createElement('button');
    btnTake.className = 'btn btn-take';
    btnTake.innerHTML = '<i class="fas fa-cart-arrow-down"></i> <span>ВЗЯТЬ</span>';

    controls.append(pill, qtyInput, btnAdd, btnInfo, btnTake);
    div.append(controls);

    const takePanel = createTakePanel(entry.partNumber, entry.quantity, btnTake);
    div.appendChild(takePanel);

    let isPanelActive = false;

    btnTake.onclick = async (e) => {
      e.preventDefault(); e.stopPropagation();
      if (!isPanelActive) {
        document.querySelectorAll('.take-quick-panel.active').forEach(p => p.classList.remove('active'));
        takePanel.classList.add('active');
        isPanelActive = true;
      } else {
        const data = btnTake.panelData;
        let qty = data.qtySelect.value === 'custom' ? data.customQty : (data.qtySelect.value === 'other' ? null : parseInt(data.qtySelect.value));
        let machine = data.machineSelect.value === 'custom' ? data.customMachine : (data.machineSelect.value === 'Другое' ? null : data.machineSelect.value);
        if (!qty || qty <= 0) { alert('Укажите корректное количество'); return; }
        if (!machine || machine.trim() === '') { alert('Укажите номер машины'); return; }
        if (qty > data.availableQty) { alert(`Недостаточно в наличии! Доступно: ${data.availableQty}`); return; }
        const scrollPos = window.scrollY;
        await updateQuantity(data.partNumber, -qty, machine);
        takePanel.classList.remove('active');
        isPanelActive = false;
        setTimeout(() => window.scrollTo({ top: scrollPos, behavior: 'auto' }), 10);
      }
    };

    editButton.addEventListener('click', function(e) {
      e.stopPropagation();
      const partNumber = partNameContainer.dataset.partNumber;
      const currentName = partNameText.textContent === 'Нет названия' ? '' : partNameText.textContent;
      partNameContainer.classList.add('editing');
      const input = document.createElement('input');
      input.type = 'text'; input.className = 'part-name-input'; input.value = currentName;
      const saveButton = document.createElement('button');
      saveButton.className = 'part-name-save-btn'; saveButton.innerHTML = '<i class="fas fa-check"></i>';
      const cancelButton = document.createElement('button');
      cancelButton.className = 'part-name-cancel-btn'; cancelButton.innerHTML = '<i class="fas fa-times"></i>';
      partNameText.style.display = 'none'; editButton.style.display = 'none';
      partNameContainer.appendChild(input); partNameContainer.appendChild(saveButton); partNameContainer.appendChild(cancelButton);
      input.focus(); input.select();
      const finishEdit = async (save = false) => {
        const newName = save ? input.value.trim() : (currentName || 'Нет названия');
        partNameContainer.classList.remove('editing');
        input.remove(); saveButton.remove(); cancelButton.remove();
        partNameText.style.display = ''; editButton.style.display = '';
        if (save && newName !== currentName) await updatePartName(partNumber, newName);
      };
      saveButton.addEventListener('click', () => finishEdit(true));
      cancelButton.addEventListener('click', () => finishEdit(false));
      input.addEventListener('keypress', (e) => { if (e.key === 'Enter') finishEdit(true); });
    });

    btnAdd.onclick = async (e) => {
      e.stopPropagation();
      const deltaStr = prompt('Введите число для добавления:');
      const delta = Number(deltaStr);
      if (deltaStr !== null && !isNaN(delta)) await updateQuantity(entry.partNumber, delta, '');
    };

    btnInfo.onclick = async (e) => {
      e.stopPropagation();
      const hist = await getHistory(entry.partNumber);
      document.getElementById('modalContent').textContent = hist;
      document.getElementById('modalOverlay').style.display = 'flex';
    };

    document.addEventListener('click', function(e) {
      if (!div.contains(e.target)) { takePanel.classList.remove('active'); isPanelActive = false; }
    });

    return div;
  }

  function updateTotalPages() { totalPages = Math.ceil(currentEntries.length / cardsPerPage) || 1; }

  function renderPage(page) {
    const container = document.getElementById('cardsContainer');
    if (!container) return;
    const scrollPos = window.scrollY;
    container.innerHTML = '';
    const pageData = currentEntries.slice((page - 1) * cardsPerPage, page * cardsPerPage);
    if (pageData.length === 0) { container.innerHTML = '<div class="no-data">НЕТ ДАННЫХ</div>'; return; }
    pageData.forEach(entry => container.appendChild(createCard(entry)));
    renderPageNumbers(); updatePaginationControls();
    if (window.scrollRestoration !== 'manual') window.scrollTo(0, scrollPos);
    if (window.innerWidth > 1024) {
      container.classList.add('desktop-layout');
      document.querySelectorAll('.card').forEach(c => c.classList.add('desktop-layout'));
    }
  }

  function renderPageNumbers() {
    const pc = document.getElementById('pageNumbers');
    if (!pc) return;
    pc.innerHTML = '';
    const max = 5;
    let start = Math.max(currentPage - 2, 1);
    let end = Math.min(start + max - 1, totalPages);
    if (start > 1) { addPB(1); if (start > 2) addDots(); }
    for (let i = start; i <= end; i++) addPB(i);
    if (end < totalPages) { if (end < totalPages - 1) addDots(); addPB(totalPages); }
    function addPB(p) { const b = document.createElement('button'); b.textContent = p; if (p === currentPage) b.classList.add('active'); b.onclick = () => goToPage(p); pc.appendChild(b); }
    function addDots() { const s = document.createElement('span'); s.textContent = '…'; s.style.cssText='padding:0 8px;color:var(--text-muted);font-size:14px;'; pc.appendChild(s); }
  }

  function goToPage(page) {
    if (page < 1 || page > totalPages) return;
    currentPage = page; renderPage(currentPage);
  }

  function updatePaginationControls() {
    const prev = document.getElementById('prevBtn'), next = document.getElementById('nextBtn');
    if (prev) prev.disabled = currentPage <= 1;
    if (next) next.disabled = currentPage >= totalPages;
  }

  function toggleDesktopLayout(enable) {
    const c = document.getElementById('cardsContainer');
    if (!c) return;
    if (enable) { c.classList.add('desktop-layout'); document.querySelectorAll('.card').forEach(card => card.classList.add('desktop-layout')); }
    else { c.classList.remove('desktop-layout'); document.querySelectorAll('.card').forEach(card => card.classList.remove('desktop-layout')); }
  }

  async function initApp() {
    showOperationLoader(true);
    try {
      allEntries = await loadAllData();
      currentEntries = [...allEntries];
      updateTotalPages(); currentPage = 1; renderPage(currentPage);
    } catch(error) { console.error('Init error:', error); alert('Ошибка загрузки данных: ' + error.message); }
    finally { showOperationLoader(false); }

    document.getElementById('btnSearch')?.addEventListener('click', () => {
      const term = prompt('Введите номер детали:');
      if (term !== null) {
        const s = term.toLowerCase().trim();
        currentEntries = s.length === 0 ? [...allEntries] : allEntries.filter(e => e.partNumber.toLowerCase().includes(s));
        updateTotalPages(); currentPage = 1; renderPage(currentPage);
        document.getElementById('sortSelect').value = 'all';
      }
    });
    document.getElementById('btnReset')?.addEventListener('click', () => {
      currentEntries = [...allEntries]; updateTotalPages(); currentPage = 1; renderPage(currentPage);
      document.getElementById('sortSelect').value = 'all';
    });
    document.getElementById('sortSelect')?.addEventListener('change', async function() {
      showOperationLoader(true);
      try {
        if (this.value === 'all') { currentEntries = [...allEntries]; }
        else if (this.value === 'popular') { const p = await getPopularEntries(); if (p?.length) currentEntries = p; }
        else if (this.value === 'mostPopular') { const p = await getMostPopularEntries(); if (p?.length) currentEntries = p; else { alert('Нет данных'); return; } }
        else if (this.value === 'sortByQty') { currentEntries = [...allEntries].sort((a,b) => a.quantity - b.quantity); }
        updateTotalPages(); currentPage = 1; renderPage(currentPage);
      } finally { showOperationLoader(false); }
    });
    document.getElementById('modalClose')?.addEventListener('click', () => { document.getElementById('modalOverlay').style.display = 'none'; });
    document.getElementById('modalOverlay')?.addEventListener('click', (e) => { if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').style.display = 'none'; });
    document.getElementById('photoCloseBtn')?.addEventListener('click', () => { document.getElementById('photoModal').style.display = 'none'; });
    document.getElementById('photoModal')?.addEventListener('click', (e) => { if (e.target === document.getElementById('photoModal')) document.getElementById('photoModal').style.display = 'none'; });
  }

  window.addEventListener('resize', () => toggleDesktopLayout(window.innerWidth > 1024));
</script>
